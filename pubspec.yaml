name: healthy_therapy_ms
description: Application de santé pour patients atteints de sclérose en plaques
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  
  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  crypto: ^3.0.3
  
  # UI/UX
  table_calendar: ^3.0.9
  fl_chart: ^0.65.0
  image_picker: ^1.0.7
  video_player: ^2.8.2
  cached_network_image: ^3.3.1
  
  # Authentication
  local_auth: ^2.1.8
  
  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
